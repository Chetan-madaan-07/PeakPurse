version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: peakpurse-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-peakpurse_dev}
      POSTGRES_USER: ${DB_USERNAME:-peakpurse_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - peakpurse-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-peakpurse_user} -d ${DB_DATABASE:-peakpurse_dev}"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: peakpurse-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - peakpurse-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: peakpurse-backend
    environment:
      - NODE_ENV=${APP_ENV:-development}
      - PORT=${BACKEND_PORT:-3000}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-peakpurse_user}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_DATABASE=${DB_DATABASE:-peakpurse_dev}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ML_SERVICE_URL=http://ml-service:8000
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - ../backend:/app
      - /app/node_modules
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - peakpurse-network
    command: npm run start:dev

  # ML Service
  ml-service:
    build:
      context: ../ml-service
      dockerfile: Dockerfile
    container_name: peakpurse-ml-service
    environment:
      - DEBUG=true
      - DATABASE_URL=postgresql://${DB_USERNAME:-peakpurse_user}:${DB_PASSWORD:-password}@postgres:5432/${DB_DATABASE:-peakpurse_dev}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
    ports:
      - "${ML_SERVICE_PORT:-8000}:8000"
    volumes:
      - ../ml-service:/app
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - peakpurse-network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: peakpurse-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:3000
      - NEXT_PUBLIC_WS_URL=ws://backend:3000
      - NEXT_PUBLIC_APP_VERSION=${APP_VERSION:-1.0.0}
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - peakpurse-network
    command: npm run dev

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: peakpurse-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - peakpurse-network
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:
  uploads:

networks:
  peakpurse-network:
    driver: bridge
